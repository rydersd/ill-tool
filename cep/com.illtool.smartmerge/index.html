<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Smart Merge</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- Header -->
    <div class="header">
        <span class="header-title">Smart Merge</span>
        <div class="status-indicator">
            <span class="status-dot ready" id="statusDot"></span>
            <span class="status-label ready" id="statusLabel">ready</span>
        </div>
    </div>

    <!-- Scan Results -->
    <div class="section">
        <div class="section-label">Merge Candidates</div>
        <div class="merge-readout" id="mergeReadout">Select paths and click Scan</div>
    </div>

    <!-- Radius Slider -->
    <div class="section">
        <div class="section-label">Merge Radius</div>
        <div class="slider-group">
            <div class="slider-row">
                <span class="slider-label">Tolerance</span>
                <input type="range" id="radiusSlider" min="1" max="20" value="5" step="0.5">
                <span class="slider-value" id="radiusValue">5</span>
                <span class="slider-label" style="flex: 0 0 12px;">pt</span>
            </div>
        </div>
    </div>

    <!-- Options -->
    <div class="section">
        <div class="section-label">Options</div>
        <div class="checkbox-row">
            <input type="checkbox" id="chkFormAware" checked>
            <label for="chkFormAware" title="Use 3D surface analysis to prefer merging paths on the same geometric surface">Surface-aware merge</label>
        </div>
        <div class="checkbox-row">
            <input type="checkbox" id="chkChainMerge">
            <label for="chkChainMerge" title="Iteratively merge connected paths: if A&#8594;B merges and B&#8594;C are close, also merge B&#8594;C">Chain merge (A&#8594;B&#8594;C)</label>
        </div>
        <div class="checkbox-row">
            <input type="checkbox" id="chkPreserveHandles">
            <label for="chkPreserveHandles" title="Keep original handle directions at merge points — preserves angular contours like GIR's eyes">Preserve handles (angular)</label>
        </div>
    </div>

    <!-- Actions -->
    <div class="section">
        <div class="action-buttons">
            <div class="btn-row">
                <button class="btn btn-primary" id="btnScan" onclick="doScan()" title="Find mergeable endpoint pairs in selection">Scan</button>
                <button class="btn btn-secondary" id="btnPreview" onclick="doPreview()" disabled title="Show merge connection lines (Space)">Preview</button>
            </div>
            <div class="btn-row">
                <button class="btn btn-merge" id="btnMerge" onclick="doMerge()" disabled title="Execute merge — originals will be replaced (Enter)">Merge</button>
                <button class="btn btn-secondary" id="btnUndo" onclick="doUndoMerge()" disabled title="Remove preview lines (Esc)">Cancel Preview</button>
            </div>
        </div>
    </div>

    <!-- CSInterface library -->
    <script src="./CSInterface.js"></script>
    <!-- Panel logic -->
    <script src="./js/main.js"></script>
</body>
</html>
